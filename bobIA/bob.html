<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BobIA Canalytics</title>
    <link rel="stylesheet" href="../public/css/style.css">
    <link rel="stylesheet" href="../public/css/bob.css">
</head>
<body>
    
    <nav class="barra-navegacao">
        <div class="container-navegacao">
            <a href="index.html" class="logotipo">
                <img src="img/CanalyticsLogo.png" alt="logotipo" style="height: 40px; width: auto;">
            </a>
            <ul class="menu-lista">
                <li class="menu-item"><a href="index.html" class="link-menu-ativo">Sair</a></li>
            </ul>
        </div>
    </nav>

    <main class="conteudoPrincipal">
        <section class="secaoBobIa">
            <h1 class="tituloPrincipal">BobIA <br><small class="small">(Canalytics)</small></h1>
            <textarea id="inputPergunta" class="campoTexto" placeholder="Digite sua dúvida, N3.."></textarea>
            <br><br>
            <button id="botaoGerar" class="botaoPrincipal" onclick="gerarResposta()">Gerar Resposta</button>
            
            <h3 class="subTitulo">Resposta da IA:</h3>
            <div id="divResposta" class="caixaResposta"></div>
        </section>

        
    </main>

    <footer class="rodape-final">
        <p class="texto-copyright">© 2026 Projeto Canalytics - São Paulo Tech School</p>
    </footer>
    <script src="js/bobia.js"></script>
    <script>
        
        function validacoes() {
            const vetorErros = []
            const perguntaInformada = inputPergunta.value.trim()

            const perguntaVazia = perguntaInformada.length === 0

            if (perguntaVazia) {
                vetorErros.push('A pergunta não pode estar vazia. Digite algo.')
            }

            if (vetorErros.length > 0) {
                alert(vetorErros.join('\n'))
                return false
            }

            return true
        }

        async function gerarResposta() {
            
            const inputsValidos = validacoes()

            if (!inputsValidos) {
                return false
            }

            botaoGerar.classList.add('botaoBloqueado')
            botaoGerar.innerText = 'Buscando resposta...'
            botaoGerar.disabled = true

            try {
                const pergunta = inputPergunta.value.trim().toLowerCase()

                const response = await fetch('/perguntar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ pergunta })
                })

                const data = await response.json()


                if (!response.ok) {
                const mensagemErro = data.resultado || data.error || 'Erro não mapeado. Culpe o Yuri e tente novamente mais tarde.'
                divResposta.style.display = 'block'
                divResposta.innerText = mensagemErro
                return false
            }

                divResposta.style.display = 'block'

             
                divResposta.innerText = data.resultado   

            } catch (erro) {
                divResposta.style.display = 'block'
                divResposta.innerText = 'Não foi possível conectar ao servidor. Verifique se o BobIA PRO está rodando.'
                console.error('Erro no frontend:', erro)
            } finally {
                botaoGerar.classList.remove('botaoBloqueado')
                botaoGerar.innerText = 'Gerar Resposta'
                botaoGerar.disabled = false
            }
        }

    </script>
    
</body>
</html>
