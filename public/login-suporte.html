<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Crie sua Conta</title>
        <link rel="stylesheet" href="css/style.css">
    </head>

<body>
    <nav class="barra-navegacao">
        <div class="container-navegacao">
            <a href="index.html" class="logotipo">
                <img src="img/CanalyticsLogo.png" alt="logotipo">
            </a>
            <ul class="menu-lista">
                <li class="menu-item"><a href="index.html" class="link-menu"> Voltar ao Início</a></li>
            </ul>
        </div>
    </nav>


    <div class="cadastrosuporte">


        <div class="esquerda">
            <h1>Login Suporte</h1>
            <br>



            <div class="campo">
                <label for="email">Email Corporativo</label>
                <input id="email" type="text" placeholder="suporte@canalytics.com" />
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input id="senha" type="password" placeholder="Mínimo 8 caracteres" />
            </div>

            <button class="btn-login" onclick="Entrar()">Entrar</button>


        </div>
        <div class="imagem-direitasuporte">
        </div>
        <script>
            function Entrar() {
                var email = document.getElementById("email").value;
                var senha = document.getElementById("senha").value;

                if(email == "suporte@canalytics.com" && senha == "sptech") {
                    alert("Login bem-sucedido! Redirecionando para a página de suporte...");
                    window.location.href = "bob.html";
                } else {
                    alert("Credenciais inválidas. Por favor, tente novamente.");
                }
            }
        </script>
</html>
