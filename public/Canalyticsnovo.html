<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canalytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/dash.css">
    <link rel="icon" href="img/CANALYTICS.png">
</head>

<body class="dashboard" style="display: flex; flex-direction: column; align-items: center; min-height: 100vh;">

<nav>
    <div style="display: flex; align-items: center; gap: 10px;">
        <img src="https://raw.githubusercontent.com/Grupo1-MQ-2/SPRINT-2/main/SiteInstitucional/img/logo_canalytics.png"
             alt="Logo Canalytics" style="height: 150px; width: auto;">
    </div>
    <div style="display: flex; align-items: center; gap: 20px;">
        <button class="btn-1" onclick="window.location.href='index.html'">Voltar para o início</button>
    </div>
</nav>





<div class="kpi-container" id="kpiContainer">
    <div class="kpi-indicadores">concentração atual
        <p class="kpi-valor" id="kpiAtual">--</p>
        <p class="kpi-subtexto" id="kpiAtualHora">último registro</p>
    </div>
    <div class="kpi-indicadores">média do dia
        <p class="kpi-valor" id="kpiMedia">--</p>
        <p class="kpi-subtexto" id="kpiMediaStatus">--</p>
    </div>
    <div class="kpi-indicadores">umidade atual
        <p class="kpi-valor" id="kpiUmidade">--</p>
        <p class="kpi-subtexto" id="kpiUmidadeStatus">último registro</p>
    </div>
</div>


<div style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;">
    <div>
        <canvas id="myChart" style="position: relative; height: 25vw; width: 30vw;"></canvas>
    </div>
    <div>
        <canvas id="myChart2" style="position: relative; height: 25vw; width: 30vw;"></canvas>
    </div>
</div>

<p class="aviso-captura" id="avisoCaptura"></p>

</body>
</html>

<script>
  
    let chartLinhas = null; 
    let chartBarras = null;
    let proximaAtualizacao;   

    let aquarioAtivo = null;  


    window.onload = function () {
        const aquarios = getAquarios();

        aquarios.forEach(item => {
            const btn = document.createElement('button');
            btn.id        = `btn_${item.id}`;
            btn.textContent = item.descricao;
            btn.className = 'btn-aquario';
            btn.onclick   = () => selecionarAquario(item.id);
            document.getElementById('btnsAquario').appendChild(btn);
        });

        if (aquarios.length > 0) {
            selecionarAquario(aquarios[0].id);
        }
    };


    function getAquarios() {
        try {
            return JSON.parse(sessionStorage.AQUARIOS);
        } catch (e) {
            
            return [{ id: 1, descricao: 'Aquário 1' }];
        }
    }

 
    function selecionarAquario(idAquario) {
        
        if (proximaAtualizacao) clearTimeout(proximaAtualizacao);

        aquarioAtivo = idAquario;

        
        getAquarios().forEach(item => {
            const btn = document.getElementById(`btn_${item.id}`);
            btn.className = item.id == idAquario ? 'btn-aquario-ativo' : 'btn-aquario';
        });

       
        if (chartLinhas) { chartLinhas.destroy(); chartLinhas = null; }
        if (chartBarras) { chartBarras.destroy(); chartBarras = null; }

      
        document.getElementById('avisoCaptura').textContent = '';

        
        obterDadosGrafico(idAquario);
    }

 
    function obterDadosGrafico(idAquario) {
        fetch(`/medidas/ultimas/${idAquario}`, { cache: 'no-store' })
            .then(response => {
                if (!response.ok) throw new Error('Erro na API');
                return response.json();
            })
            .then(resposta => {
                console.log('Dados recebidos:', resposta);
                resposta.reverse(); 
                plotarGrafico(resposta, idAquario);
            })
            .catch(err => {
                console.error('Erro ao obter dados:', err.message);
            });
    }

 
    function plotarGrafico(medidas, idAquario) {

        const labels      = medidas.map(r => r.momento_grafico);
        const temperaturas = medidas.map(r => r.temperatura);
        const umidades    = medidas.map(r => r.umidade);

     
        atualizarKPIs(medidas);

   
        const dadosLinhas = {
            labels,
            datasets: [
                {
                    label: 'Temperatura (°C)',
                    backgroundColor: 'rgb(199, 89, 89)',
                    borderColor: 'rgb(199, 89, 89)',
                    data: temperaturas,
                    tension: 0.4,
                    fill: false
                },
                {
                    label: 'Umidade (%)',
                    backgroundColor: 'rgb(75, 192, 192)',
                    borderColor: 'rgb(75, 192, 192)',
                    data: umidades,
                    tension: 0.4,
                    fill: false
                }
            ]
        };

        chartLinhas = new Chart(document.getElementById('myChart'), {
            type: 'line',
            data: dadosLinhas,
            options: { responsive: true, maintainAspectRatio: false }
        });

       
        const blocos     = agruparEmBlocos(medidas, 2);
        const labelsBar  = blocos.map((_, i) => `Período ${i + 1}`);
        const mediasTemp = blocos.map(b => media(b.map(r => r.temperatura)));

        const dadosBarras = {
            labels: labelsBar,
            datasets: [
                {
                    label: 'Média de Temperatura por Período (°C)',
                    backgroundColor: 'rgb(151, 196, 89)',
                    borderColor: 'rgb(151, 196, 89)',
                    data: mediasTemp,
                    borderRadius: 5
                }
            ]
        };

        chartBarras = new Chart(document.getElementById('myChart2'), {
            type: 'bar',
            data: dadosBarras,
            options: { responsive: true, maintainAspectRatio: false }
        });


        proximaAtualizacao = setTimeout(() => atualizarGrafico(idAquario, dadosLinhas), 2000);
    }

    function atualizarGrafico(idAquario, dados) {
       
        if (aquarioAtivo != idAquario) return;

        fetch(`/medidas/tempo-real/${idAquario}`, { cache: 'no-store' })
            .then(response => {
                if (!response.ok) throw new Error('Erro na API');
                return response.json();
            })
            .then(novoRegistro => {
                console.log('Novo registro:', novoRegistro);

                const ultimoLabel = dados.labels[dados.labels.length - 1];

                if (novoRegistro[0].momento_grafico === ultimoLabel) {
        
                    document.getElementById('avisoCaptura').innerHTML =
                        "<i class='fa-solid fa-triangle-exclamation'></i> Aguardando nova captura do sensor...";
                } else {

                    dados.labels.shift();
                    dados.labels.push(novoRegistro[0].momento_grafico);

                    dados.datasets[0].data.shift();
                    dados.datasets[0].data.push(novoRegistro[0].temperatura);

                    dados.datasets[1].data.shift();
                    dados.datasets[1].data.push(novoRegistro[0].umidade);

                    chartLinhas.update();

                    document.getElementById('avisoCaptura').textContent = '';

                    atualizarKPIsUnico(novoRegistro[0], dados);
                }

                proximaAtualizacao = setTimeout(() => atualizarGrafico(idAquario, dados), 2000);
            })
            .catch(err => {
                console.error('Erro ao atualizar gráfico:', err.message);
                proximaAtualizacao = setTimeout(() => atualizarGrafico(idAquario, dados), 2000);
            });
    }


    function atualizarKPIs(medidas) {
        if (!medidas.length) return;

        const ultimo  = medidas[medidas.length - 1];
        const temps   = medidas.map(r => r.temperatura);
        const mediaT  = media(temps);

        document.getElementById('kpiAtual').textContent       = `${ultimo.temperatura}°C`;
        document.getElementById('kpiAtualHora').textContent   = `Último registro: ${ultimo.momento_grafico}`;
        document.getElementById('kpiMedia').textContent       = `${mediaT}°C`;
        document.getElementById('kpiMediaStatus').textContent = parseFloat(mediaT) > 28 ? 'acima do ideal' : 'dentro do ideal';
        document.getElementById('kpiUmidade').textContent     = `${ultimo.umidade}%`;
        document.getElementById('kpiUmidadeStatus').textContent = `Último registro: ${ultimo.momento_grafico}`;
    }

    function atualizarKPIsUnico(registro, dados) {
        const temps  = dados.datasets[0].data;
        const mediaT = media(temps);

        document.getElementById('kpiAtual').textContent       = `${registro.temperatura}°C`;
        document.getElementById('kpiAtualHora').textContent   = `Último registro: ${registro.momento_grafico}`;
        document.getElementById('kpiMedia').textContent       = `${mediaT}°C`;
        document.getElementById('kpiMediaStatus').textContent = parseFloat(mediaT) > 28 ? 'acima do ideal' : 'dentro do ideal';
        document.getElementById('kpiUmidade').textContent     = `${registro.umidade}%`;
        document.getElementById('kpiUmidadeStatus').textContent = `Último registro: ${registro.momento_grafico}`;
    }


    function media(arr) {
        if (!arr.length) return 0;
        return (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(1);
    }

    function agruparEmBlocos(arr, tamanho) {
        const blocos = [];
        for (let i = 0; i < arr.length; i += tamanho) {
            blocos.push(arr.slice(i, i + tamanho));
        }
        return blocos;
    }
</script>
