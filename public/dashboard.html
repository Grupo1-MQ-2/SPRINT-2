<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canalytics</title>

    <link rel="stylesheet" href="css/dash.css">
    <link rel="icon" href="../public/img/CanalyticsLogo.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dashboard">

    <nav>
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="https://raw.githubusercontent.com/Grupo1-MQ-2/SPRINT-2/main/public/img/logo_canalytics.png"
                alt="Logo Canalytics" style="height: 120px; width: auto;">
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <button class="btn-1" onclick="window.location.href='index.html'">Voltar para o início</button>
        </div>
    </nav>

    <div class="kpi-container" id="kpiContainer">
        <div class="kpi-indicadores">concentração atual
            <p class="kpi-valor" id="kpiAtual">--</p>
            <p class="kpi-subtexto" id="kpiAtualHora">último registro</p>
        </div>
        <div class="kpi-indicadores">status
            <p class="kpi-valor" id="kpiStatus">--</p>
            <p class="kpi-subtexto" id="kpiStatusTexto">--</p>
        </div>
        <div class="kpi-indicadores">sensor ativo
            <p class="kpi-valor" id="kpiSensor">--</p>
            <p class="kpi-subtexto" id="kpiSensorStatus">último registro</p>
        </div>
    </div>

    <div id="graficos"></div>

</body>

<div class="error-card" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>

</html>

<script>
    let proximaAtualizacao;

    window.onload = exibirCanavial();

    function exibirCanavial() {
        var idCanavial = 1;

        document.getElementById('graficos').innerHTML = `
            <div id="grafico${idCanavial}" class="display-block">
                <h3 class="tituloGraficos">
                    Últimas leituras de Concentração de Gás do&nbsp;<span style="color: #65a359">Sensor ${idCanavial}</span>
                </h3>
                <div class="area-graficos">
                    <div class="graph">
                        <canvas id="chartLinhas${idCanavial}"></canvas>
                    </div>
                </div>
                <div class="label-captura">
                    <p id="avisoCaptura${idCanavial}"></p>
                </div>
            </div>
        `;

        obterDadosGrafico(idCanavial);
    }

    function obterDadosGrafico(idCanavial) {
        if (proximaAtualizacao != undefined) {
            clearTimeout(proximaAtualizacao);
        }

        fetch(`/leituras/ultimas/${idCanavial}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    resposta.reverse();

                    plotarGrafico(resposta, idCanavial);
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    function plotarGrafico(leituras, idCanavial) {
        console.log('iniciando plotagem do gráfico...');

        let labels = [];

        let dados = {
            labels: labels,
            datasets: [{
                label: 'Concentração de Gás (ppm)',
                data: [],
                fill: false,
                borderColor: 'rgb(101, 163, 89)',
                backgroundColor: 'rgb(101, 163, 89)',
                tension: 0.4
            }]
        };

        for (let i = 0; i < leituras.length; i++) {
            var registro = leituras[i];
            labels.push(registro.momento_grafico);
            dados.datasets[0].data.push(registro.valor_gas);
        }

        let chartLinhas = new Chart(
            document.getElementById(`chartLinhas${idCanavial}`),
            { type: 'line', data: dados, options: { responsive: true } }
        );

        atualizarKPIs(leituras);

        setTimeout(() => atualizarGrafico(idCanavial, dados, chartLinhas), 2000);
    }

    function atualizarGrafico(idCanavial, dados, chartLinhas) {
        fetch(`/leituras/tempo-real/${idCanavial}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (novoRegistro) {
                    console.log(`Dados recebidos: ${JSON.stringify(novoRegistro)}`);

                    let avisoCaptura = document.getElementById(`avisoCaptura${idCanavial}`);
                    avisoCaptura.innerHTML = '';

                    if (novoRegistro[0].momento_grafico == dados.labels[dados.labels.length - 1]) {
                        console.log('Como não há dados novos para captura, o gráfico não atualizará.');
                        avisoCaptura.innerHTML =
                            "Foi trazido o dado mais atual capturado pelo sensor. " +
                            "Como não há dados novos a exibir, o gráfico não atualizará.";
                    } else {
                        dados.labels.shift();
                        dados.labels.push(novoRegistro[0].momento_grafico);

                        dados.datasets[0].data.shift();
                        dados.datasets[0].data.push(novoRegistro[0].valor_gas);

                        chartLinhas.update();

                        atualizarKPIsUnico(novoRegistro[0]);
                    }

                    proximaAtualizacao = setTimeout(() => atualizarGrafico(idCanavial, dados, chartLinhas), 2000);
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
                proximaAtualizacao = setTimeout(() => atualizarGrafico(idCanavial, dados, chartLinhas), 2000);
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    function atualizarKPIs(leituras) {
        if (!leituras.length) return;
        const ultima = leituras[leituras.length - 1];

        document.getElementById('kpiAtual').textContent = `${ultima.valor_gas} ppm`;
        document.getElementById('kpiAtualHora').textContent = `Último registro: ${ultima.momento_grafico}`;

        
        document.getElementById('kpiStatus').textContent = calcularStatus(ultima.valor_gas);
        document.getElementById('kpiStatusTexto').textContent = "Classificação do nível";

        document.getElementById('kpiSensor').textContent = `Sensor ${ultima.id_sensor}`;
        document.getElementById('kpiSensorStatus').textContent = `Último registro: ${ultima.momento_grafico}`;
    }

    function atualizarKPIsUnico(registro) {
        document.getElementById('kpiAtual').textContent = `${registro.valor_gas} ppm`;
        document.getElementById('kpiAtualHora').textContent = `Último registro: ${registro.momento_grafico}`;


        document.getElementById('kpiStatus').textContent = calcularStatus(registro.valor_gas);
        document.getElementById('kpiStatusTexto').textContent = "Classificação do nível";
        document.getElementById('kpiSensor').textContent = `Sensor ${registro.id_sensor}`;
        document.getElementById('kpiSensorStatus').textContent = `Último registro: ${registro.momento_grafico}`;
    }

    function calcularStatus(valor_gas) {
        if (valor_gas >= 10000) {
            cardErro.style.display = "block";
                    mensagem_erro.innerHTML = `O valor ultrapassou 10.000 ppm, CRÍTICO`;
            return 'CRÍTICO';
        } else if (valor_gas >= 5000) {
            cardErro.style.display = "block";
                    mensagem_erro.innerHTML = `O valor ultrapassou 5.000 ppm, ALERTA`;
            return 'ATENÇÃO';
        } else {
            return 'NORMAL';
        }
    }
</script>
