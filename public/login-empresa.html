<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Crie sua Conta</title>
        <link rel="stylesheet" href="css/style.css">
    </head>

<body>
    <nav class="barra-navegacao">
        <div class="container-navegacao">
            <a href="index.html" class="logotipo">
                <img src="img/CanalyticsLogo.png" alt="logotipo">
            </a>
            <ul class="menu-lista">
                <li class="menu-item"><a href="index.html" class="link-menu"> Voltar ao Início</a></li>
            </ul>
        </div>
    </nav>


    <div class="cadastro">


        <div class="esquerda">
            <h1>Login Empresarial</h1>
            <h4>Acesso a Dashboard</h4>
            <br>



            <div class="campo">
                <label for="CNPJ">CNPJ</label>
                <input id="CNPJ" type="text" placeholder="00.000.000/0000-00" />
            </div>

            <div class="campo">
                <label for="codigo">Código de Acesso</label>
                <input id="codigo" type="text" placeholder="Digite o código de acesso" />
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input id="senha" type="password" placeholder="Mínimo 8 caracteres" />
            </div>

            <button class="btn-login" onclick="Entrar()">Entrar</button>



            <p class="login-cadastro">
                Não possui uma conta empresarial?
                <a href="cadastro-empresa.html">Cadastre sua empresa</a>
            </p>
        </div>
        <div class="imagem-direita">
        </div>
