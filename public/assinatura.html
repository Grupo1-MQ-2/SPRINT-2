<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canalytics</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="barra-navegacao">
        <div class="container-navegacao">
            <a href="index.html" class="logotipo">
                <img src="img/CanalyticsLogo.png" alt="logotipo">
            </a>
            <ul class="menu-lista">
                <li class="menu-item"><a href="index.html" class="link-menu-ativo">Início</a></li>
                <li class="menu-item"><a href="solucao.html" class="link-menu">Solução</a></li>
                <li class="menu-item"><a href="calculadora.html" class="link-menu">Simulador financeiro</a></li>
                <li class="menu-item"><a href="telaAcesso.html" class="link-menu">Acesso</a></li>
            </ul>
        </div>
    </nav>

    <div class="navbar">
        <div class="titulo">
            <h2 style=" font-size: 38px; color: #01352c; "> Assinar Serviço </h2>
        </div>
    </div>

    <div class="main">
        <details class="card_empresa">
            <summary>Empresa</summary>
            <label style="font-size: 22px; color: #01352c" ;>CEP:</label>
            <input type="number" id="ipt_CEP" class="input" placeholder="07174-270">

            <label style="font-size: 22px; color: #01352c" ;>Estado:</label>
            <input type="text" id="ipt_estado" class="input" placeholder="São Paulo">

            <label style="font-size: 22px; color: #01352c" ;>Cidade:</label>
            <input type="text" id="ipt_cidade" class="input" placeholder="São Paulo">

            <label style="font-size: 22px; color: #01352c" ;>Rua:</label>
            <input type="text" id="ipt_rua" class="input" placeholder="Rua Ministro Marcos Freire">

            <label style="font-size: 22px; color: #01352c" ;>Número:</label>
            <input type="number" id="ipt_numero" class="input" placeholder="212">
        </details>

        <details class="card_responsavel">
            <summary>Representante</summary>
            <label style="font-size: 22px; color: #01352c" ;>Razão Social:</label>
            <input type="text" id="ipt_razao_social" class="input"
                placeholder="*Arcos Dourados Comércio de Alimentos S.A*">

            <label style="font-size: 22px; color: #01352c" ;>CNPJ:</label>
            <input type="number" id="ipt_CNPJ" class="input" placeholder="12345678000195">

            <label style="font-size: 22px; color: #01352c" ;>Ramo de atividade:</label>
            <input type="text" id="ipt_ramoAtividade" class="input" placeholder="Agricultura">
        </details>

        <details class="card_planos">
            <summary>Planos</summary>
            <div class="button">
                <button class="btn" onclick="calcularTrimestral()">Plano Trimestral (Econômico)</button>

                <button class="btn" onclick="calcularSemestral()">Plano Semestral (Recomendado)</button>

                <button class="btn" onclick="calcularAnual()">Plano Anual (Premium)</button>
            </div>
            <br><br>
            <div id="caixa" class="caixa" style="display: none;">
                <div class="mensagens">
                    <div id="divPatrimonioRisco"></div>
                    <br>
                    <div id="divResultadoInvestimento"></div>
                    <br>
                </div>
                <button class="btn_assinar" onclick="location.window.href='assinatura.html'">Assinar</button>
            </div>

        </details>

        <details class="card_pagamento">
            <summary>Forma de Pagamento</summary>

            <select name="pagamento">
                <option>Cartão de Crédito</option>
                <option>Boleto</option>
                <option>PIX</option>
            </select>
            
            <br>
            <input type="checkbox" required>
            <label>Li e aceito os termos do contrato.</label>
        </details>
    </div>

    <footer class="rodape-final">
        <p class="texto-copyright">© 2026 Projeto Canalytics - São Paulo Tech School</p>
    </footer>
</body>

</html>
