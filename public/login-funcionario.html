<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Crie sua Conta</title>
        <link rel="stylesheet" href="css/style.css">
    </head>

<body>
    <nav class="barra-navegacao">
        <div class="container-navegacao">
            <a href="index.html" class="logotipo">
                <img src="img/CanalyticsLogo.png" alt="logotipo">
            </a>
            <ul class="menu-lista">
                <li class="menu-item"><a href="index.html" class="link-menu"> Voltar ao Início</a></li>
            </ul>
        </div>
    </nav>


    <div class="cadastro">


        <div class="esquerda">
            <h1>Login do Representante</h1>
            <h4>Acesso aos dados da empresa vinculada</h4>
            <br>



            <div class="campo">
                <label for="email">Email</label>
                <input id="email" type="text" placeholder="seuemail@exemplo.com">
            </div>


            <div class="campo">
                <label for="codigo">Código de Acesso</label>
                <input id="codigo" type="text" placeholder="Digite o código de acesso" />
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input id="senha" type="password" placeholder="Mínimo 8 caracteres" />
            </div>

            <button class="btn-login" onclick="Entrar()">Entrar</button>


            <p class="login-cadastrof">
                O acesso de representantes é vinculado a uma empresa cadastrada.
                <br>
                Caso ainda não possua credenciais ou o código de acesso, entre em contato com o responsável da sua
                organização.
            </p>
        </div>
        <div class="imagem-direitafuncionario">
        </div>
